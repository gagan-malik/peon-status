# Peon status page — https://github.com/gagan-malik/peon-status
# Docs: https://upptime.js.org/docs/configuration

owner: gagan-malik
repo: peon-status

sites:
  - name: Website
    url: https://peon.online
  - name: App
    url: https://app.peon.online

status-website:
  # Public URL until a custom domain is configured:
  # https://gagan-malik.github.io/peon-status/
  # Optional: set cname: status.peon.online and add DNS + Pages custom domain.
  baseUrl: /peon-status
  # 1) themeUrl — :root tokens (loads first). 2) global.css (Upptime). 3) links — Inter, then overrides after global.
  themeUrl: https://raw.githubusercontent.com/gagan-malik/peon-status/master/assets/peon-theme.css
  links:
    - rel: stylesheet
      href: https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap
    - rel: stylesheet
      href: https://raw.githubusercontent.com/gagan-malik/peon-status/master/assets/peon-shadcn-overrides.css
  metaTags:
    - name: theme-color
      content: "#f4f4f5"
  logoUrl: https://peon.online/icons/icon-192.png
  name: Peon
  introTitle: "Peon service status"
  introMessage: Uptime for the **marketing site** ([peon.online](https://peon.online)) and **app** ([app.peon.online](https://app.peon.online)). Powered by [Upptime](https://github.com/upptime/upptime) — GitHub Actions, Issues, and Pages.
  navbar:
    - title: Status
      href: /
    - title: Peon
      href: https://peon.online
    - title: App
      href: https://app.peon.online
    - title: Repo
      href: https://github.com/$OWNER/$REPO
